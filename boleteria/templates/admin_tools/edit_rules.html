{% extends "base.html" %}
{% block title %}Editar reglas | Boletas QR{% endblock %}
{% block content %}
  <section class="panel mx-auto max-w-5xl p-6">
    <h1 class="text-2xl font-semibold text-brand-900">
      <span class="title-top">Editar</span>
      <span class="title-bottom">reglas</span>
    </h1>
    <p class="mt-2 text-sm text-slate-600">Editando archivo: {{ rules_filename }}</p>
    <form class="mt-4 space-y-3" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex flex-wrap gap-3">
        <button class="btn-primary" type="submit">Guardar reglas</button>
        <a class="btn-neutral" href="{% url 'rules_page' %}">Vista previa de reglas</a>
      </div>
    </form>
  </section>
{% endblock %}
