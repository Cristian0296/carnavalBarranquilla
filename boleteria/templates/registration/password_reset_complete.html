{% extends "base.html" %}
{% block title %}Contraseña actualizada | Boletas QR{% endblock %}
{% block content %}
  <section class="mx-auto max-w-xl">
    <section class="panel mx-auto w-full p-6 lg:p-8">
      <h1 class="text-2xl font-semibold text-brand-900 lg:text-3xl">
        <span class="title-top">Contraseña</span>
        <span class="title-bottom">actualizada</span>
      </h1>
      <p class="mt-2 text-slate-600">Tu contraseña fue cambiada correctamente. Ya puedes iniciar sesión con la nueva contraseña.</p>
      <p class="mt-5"><a class="link-primary font-semibold" href="{% url 'login' %}">Ir a iniciar sesión</a></p>
    </section>
  </section>
{% endblock %}
